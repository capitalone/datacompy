# This workflow builds and publishes the latest docs to
# the `gh-pages` branch.
# For more details: https://github.com/marketplace/actions/deploy-to-github-pages
name: Publish docs

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5  # v2
      with:
        # fetch all tags so `versioneer` can properly determine current version
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@e9aba2c848f5ebd159c070c61ea2c4e2b122355e  # v2
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: python -m pip install .[dev]
    - name: Build
      run: make sphinx
      shell: bash
    - name: Publish
      uses: JamesIves/github-pages-deploy-action@049a95c516cd5723d8cfde79dc7a79fcdcbd6c97  # v4.0.0
      with:
        branch: gh-pages
        folder: docs/build/html
