# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Test package

on:
  push:
    branches: [develop, main, "release/*", "release-*", "support/*"]
  pull_request:
    branches: [develop, main, "release/*", "release-*", "support/*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install .[qa]
      - name: Linting by ruff
        run: ruff check
      - name: Formatting by ruff
        run: ruff format --check

  test-with-spark-3-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        spark-version: [3.5.8]
        pandas-version: ["2.3.3", "3.0.3"]
        exclude:
          - python-version: "3.10"
            pandas-version: "3.0.3"

    env:
      PYTHON_VERSION: ${{ matrix.python-version }}
      SPARK_VERSION: ${{ matrix.spark-version }}
      PANDAS_VERSION: ${{ matrix.pandas-version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup Java JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          java-version: "17"
          distribution: "adopt"
      - name: Install pyspark
        run: |
          python -m pip install pyspark[connect]==${{ matrix.spark-version }}
      - name: Install pandas
        run: |
          python -m pip install pandas==${{ matrix.pandas-version }}
      - name: Install datacompy
        run: |
          python -m pip install ."[spark, qa, tests, tests-spark]"
      - name: Test with pytest
        run: |
          python -m pytest --cov=datacompy --cov-report=xml --cov-report=term-missing
      - name: Test with pytest (ANSI mode)
        run: |
          python -m pytest -c pytest-ansi.ini --cov=datacompy --cov-report=xml --cov-report=term-missing


  test-with-spark-4-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        spark-version: [4.1.2]
        pandas-version: ["2.3.3", "3.0.3"]
        exclude:
          - python-version: "3.10"
            pandas-version: "3.0.3"

    env:
      PYTHON_VERSION: ${{ matrix.python-version }}
      SPARK_VERSION: ${{ matrix.spark-version }}
      PANDAS_VERSION: ${{ matrix.pandas-version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup Java JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          java-version: "17"
          distribution: "adopt"
      - name: Install pyspark
        run: |
          python -m pip install pyspark[connect]==${{ matrix.spark-version }}
      - name: Install pandas
        run: |
          python -m pip install pandas==${{ matrix.pandas-version }}
      - name: Install datacompy
        run: |
          python -m pip install ."[spark, qa, tests, tests-spark]"
      - name: Test with pytest
        run: |
          python -m pytest --cov=datacompy --cov-report=xml --cov-report=term-missing
      - name: Test with pytest (ANSI mode)
        run: |
          python -m pytest -c pytest-ansi.ini --cov=datacompy --cov-report=xml --cov-report=term-missing

  test-basic-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    env:
      PYTHON_VERSION: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install datacompy
        run: |
          python -m pip install ."[tests, qa]"
      - name: Test with pytest
        run: |
          python -m pytest --cov=datacompy --cov-report=xml --cov-report=term-missing
